<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snooty</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #101010; }
  #app-frame { display: block; width: 100%; height: 100%; border: 0; background: #fcfaf9; }
</style>
</head>
<body>
<!--
  Single-tab shell: every in-app screen (discover, look, booking,
  profile, dashboard, messages) loads INSIDE this one sandboxed
  iframe instead of the browser navigating to a new page. The
  sandbox attribute omits allow-top-navigation, so the browser
  itself blocks any attempt by a framed page to navigate the real
  tab (link click, location.href write, or target="_top" all no-op
  at the top level) while ordinary in-iframe navigation between
  screens keeps working exactly as each page's existing code
  already does. The outer tab's URL never changes, so there is
  nothing for the browser's real back button / Backspace to leave.
  allow-same-origin + allow-scripts + allow-forms + allow-popups
  keep every existing feature (seed.js reads, the "..." menu,
  clicking through to messages.html) working unmodified.
-->
<iframe
  id="app-frame"
  title="Snooty app preview"
  sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"
></iframe>
<script>
(function () {
  'use strict';
  const ALLOWED_SCREENS = [
    'discover.html', 'look.html', 'booking.html', 'profile.html',
    'dashboard.html', 'messages.html', 'wait.html',
  ];
  const frame = document.getElementById('app-frame');
  const outerParams = new URLSearchParams(location.search);
  const startScreen = outerParams.get('screen');
  const startQuery = location.search.replace(/^\?/, '').split('&')
    .filter((p) => !p.startsWith('screen='))
    .join('&');
  const screen = ALLOWED_SCREENS.indexOf(startScreen) !== -1 ? startScreen : 'discover.html';
  frame.src = screen + (startQuery ? '?' + startQuery : '');
})();
</script>
</body>
</html>
