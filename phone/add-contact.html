<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snooty: Add Contact</title>
<style>
body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 8vh 7vw; }
h1 { font-size: clamp(24px, 3.2vw, 40px); font-weight: 600; line-height: 1.2; margin: 0 0 0.6em; }
p { font-size: 16px; line-height: 1.55; max-width: 60ch; margin: 0 0 1.5em; }
.btn {
  font: inherit; font-size: 16px; font-weight: 600; color: #fff; background: #000; border: 1px solid #000;
  padding: 14px 24px; cursor: pointer; text-decoration: none; display: inline-block;
  -webkit-touch-callout: none; /* iOS: suppresses the long-press preview/context menu on <a> */
  -webkit-user-select: none; user-select: none; /* pairs with touch-callout; also needed for Android's context menu to stay suppressed */
}
.btn:active { background: #333; }
.status { margin-top: 1em; font-size: 14px; color: #444; min-height: 1.4em; }
</style>
</head>
<body>

<h1>Add Snooty to your contacts</h1>
<p>Tap the button below to save Snooty's contact info to your phone. Reporting a bug or sending feedback is then just a text away.</p>

<!--
  A plain link straight to a static .vcf file (snooty-support.vcf, same
  directory) is the most reliable "add to contacts" mechanism on both
  iOS Safari and Android Chrome: no JavaScript, no Blob URL, no anchor
  `download` attribute. Both mobile OSes recognize the .vcf file by
  extension/content and hand it straight to their native Contacts app
  import screen when it's opened directly, which sidesteps a known
  WebKit bug where iOS Safari ignores the `download` attribute on
  JS-generated blob links (bugs.webkit.org #167341). This is the
  standard, documented "just link to a static vcf file" pattern.
  IMPORTANT: whatever serves this repo in production must send a
  Content-Type of `text/vcard` (not the deprecated `text/x-vcard`,
  and not a generic `application/octet-stream`) for this file -- check
  the actual hosting config (Vercel/Netlify/etc.) before the event.
-->
<a class="btn" href="../snooty-support.vcf" id="add-contact-link">Add to contacts</a>
<div class="status" id="status"></div>
<div class="confirm" id="confirm" style="display:none; margin-top: 1.2em;">
  <p style="margin-bottom: 0.8em;">Did that save to your contacts?</p>
  <button class="btn" id="confirm-yes" type="button" style="background:#1a7a3d; border-color:#1a7a3d;">Yes, saved</button>
  <button class="btn" id="confirm-no" type="button" style="background:#fff; color:#000;">Didn't work</button>
</div>

<script>
(function () {
  'use strict';
  /* The .vcf link itself needs no JS -- the OS handles the import.
     What JS CAN do: notice the user tapped it, then surface a "did
     that work?" prompt once they're plausibly done, since there's no
     API that reports whether the import actually succeeded.

     Getting "plausibly done" right takes three signals, not one,
     because the vCard hand-off behaves differently per platform:
     - Android's native contact-picker intent backgrounds the browser
       tab, so visibilitychange/pageshow fire reliably on return.
     - iOS Safari (confirmed via Apple Developer Forums thread 124193)
       opens the vCard as an in-page PREVIEW SHEET on top of Safari --
       the tab is never actually hidden, so visibilitychange never
       fires there at all. Relying on it alone would mean the prompt
       silently never appears for iOS users, which is most of them.
     - A plain fixed delay covers iOS (and anything else that doesn't
       fire a visibility/focus event) without depending on any of
       this platform-specific behavior holding true on every device.
     Whichever fires first wins; the other two are then no-ops via
     the shown/cleared-timer guards below. */
  var tappedAt = null;
  var promptShown = false;
  var fallbackTimer = null;
  var link = document.getElementById('add-contact-link');
  var status = document.getElementById('status');
  var confirmBox = document.getElementById('confirm');

  /* A long-press on the link brings up the browser's OWN context menu
     (Open in New Tab / Copy Link / etc.) instead of a normal tap --
     confirmed live: choosing an option from it opened app-shell.html
     fresh instead of the vCard, because that context menu action isn't
     a real click event and can navigate outside this page's own
     iframe/sandbox context entirely. -webkit-touch-callout above
     covers iOS; Chrome on Android ignores that property, so it also
     needs its own contextmenu handler here. */
  link.addEventListener('contextmenu', function (e) { e.preventDefault(); });

  function showPrompt() {
    if (promptShown || !tappedAt) return;
    promptShown = true;
    if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
    confirmBox.style.display = 'block';
  }

  link.addEventListener('click', function () {
    tappedAt = Date.now();
    promptShown = false;
    status.textContent = 'Opening the contact card. If a preview screen appears, tap "Add Contact" or "Create New Contact."';
    if (fallbackTimer) clearTimeout(fallbackTimer);
    fallbackTimer = setTimeout(showPrompt, 4000);
  });

  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') showPrompt();
  });
  window.addEventListener('focus', showPrompt);
  window.addEventListener('pageshow', showPrompt);

  document.getElementById('confirm-yes').addEventListener('click', function () {
    confirmBox.style.display = 'none';
    tappedAt = null;
    status.textContent = 'Saved. Snooty is in your contacts.';
  });
  document.getElementById('confirm-no').addEventListener('click', function () {
    confirmBox.style.display = 'none';
    tappedAt = null;
    status.textContent = 'Tap "Add to contacts" again, or save this manually: Snooty Support, +1-910-302-7019, hisisnooty@gmail.com.';
  });
})();
</script>
</body>
</html>
