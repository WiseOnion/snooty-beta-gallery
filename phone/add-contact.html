<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snooty: Add Contact</title>
<style>
body { background: #fff; color: #000; font-family: sans-serif; margin: 0; padding: 8vh 7vw; }
h1 { font-size: clamp(24px, 3.2vw, 40px); font-weight: 600; line-height: 1.2; margin: 0 0 0.6em; }
p { font-size: 16px; line-height: 1.55; max-width: 60ch; margin: 0 0 1.5em; }
.btn { font: inherit; font-size: 16px; font-weight: 600; color: #fff; background: #000; border: 1px solid #000; padding: 14px 24px; cursor: pointer; text-decoration: none; display: inline-block; }
.btn:active { background: #333; }
.status { margin-top: 1em; font-size: 14px; color: #444; min-height: 1.4em; }
</style>
</head>
<body>

<h1>Add Snooty to your contacts</h1>
<p>Tap the button below to save Snooty's contact info to your phone. Reporting a bug or sending feedback is then just a text away.</p>

<!--
  A plain link straight to a static .vcf file (snooty-support.vcf, same
  directory) is the most reliable "add to contacts" mechanism on both
  iOS Safari and Android Chrome: no JavaScript, no Blob URL, no anchor
  `download` attribute. Both mobile OSes recognize the .vcf file by
  extension/content and hand it straight to their native Contacts app
  import screen when it's opened directly, which sidesteps a known
  WebKit bug where iOS Safari ignores the `download` attribute on
  JS-generated blob links (bugs.webkit.org #167341). This is the
  standard, documented "just link to a static vcf file" pattern.
  IMPORTANT: whatever serves this repo in production must send a
  Content-Type of `text/vcard` (not the deprecated `text/x-vcard`,
  and not a generic `application/octet-stream`) for this file -- check
  the actual hosting config (Vercel/Netlify/etc.) before the event.
-->
<a class="btn" href="../snooty-support.vcf" id="add-contact-link">Add to contacts</a>
<div class="status" id="status"></div>

<script>
(function () {
  'use strict';
  /* No JS is required for the link above to work; this only adds a
     one-time on-screen hint after the tap, since a successful contact
     import navigates the tab away and there's nothing else to confirm
     client-side. */
  document.getElementById('add-contact-link').addEventListener('click', function () {
    document.getElementById('status').textContent = 'Opening the contact card. If a preview screen appears, tap "Add Contact" or "Create New Contact."';
  });
})();
</script>
</body>
</html>
