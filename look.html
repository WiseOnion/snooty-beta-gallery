<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snooty · The Look</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/snooty.css?d=20260711">
<style>
/* Mirrors the real hisisnooty LookDetail.tsx mobile layout (<767px):
   hero-first flex column, pill back button + bookmark save button
   overlaid on the hero, thumbnail strip as a row beneath it, editorial
   serif headline, stylist row, Book Now / View Profile / more actions,
   info strip, style tags, more-from-stylist grid, reviews. */
.ld-hero { position: relative; background: var(--color-border); aspect-ratio: 3/4; max-height: 480px; overflow: hidden; }
.ld-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ld-back {
  position: absolute; top: 16px; left: 16px; z-index: 5;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 14px 9px 11px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: var(--shadow-sm); color: var(--color-primary); font-size: 12px; font-weight: 700;
}
.ld-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.ld-save {
  position: absolute; top: 16px; right: 16px; z-index: 5;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; color: var(--color-text);
}
.ld-save svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.ld-save.saved { color: var(--color-primary); }
.ld-save.saved svg { fill: currentColor; }

.ld-thumbs { display: flex; gap: 8px; padding: 12px 16px 0; overflow-x: auto; }
.ld-thumbs button {
  width: 64px; flex-shrink: 0; padding: 0; border-radius: 8px; overflow: hidden; aspect-ratio: 3/4;
  background: var(--color-border); border: 2px solid transparent; opacity: 0.6;
}
.ld-thumbs button.on { border-color: var(--color-primary); opacity: 1; }
.ld-thumbs button img { width: 100%; height: 100%; object-fit: cover; display: block; }

.ld-content { padding: 20px 18px 0; }
.ld-kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--color-text-muted); margin-bottom: 8px; }
.ld-h1 { font-family: var(--font-editorial); font-size: clamp(30px, 8vw, 40px); font-weight: 500; line-height: 1.08; color: var(--color-text); margin: 0 0 18px; }

.ld-stylist-row { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.ld-stylist-row img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.ld-stylist-name { display: flex; align-items: center; gap: 5px; font-family: var(--font-display); font-size: 15px; font-weight: 700; }
.ld-verified { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: var(--color-primary); flex-shrink: 0; }
.ld-verified svg { width: 8px; height: 8px; stroke: #fff; fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
.ld-stylist-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; font-size: 13px; color: var(--color-text-muted); }
.ld-stylist-meta svg { width: 12px; height: 12px; }
.ld-stylist-meta b { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--color-text); }

.ld-actions { display: flex; gap: 8px; margin-bottom: 24px; align-items: center; }
.ld-book {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 16px; border-radius: var(--radius-full);
  background: var(--color-primary); color: #fff; font-size: 14px; font-weight: 700; font-family: var(--font-body);
  flex: 1 1 auto; min-width: 0; white-space: nowrap;
}
.ld-book svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.ld-book:active { background: var(--color-primary-deep); }
.ld-viewprofile {
  display: inline-flex; align-items: center; justify-content: center; padding: 12px 16px; border-radius: var(--radius-full);
  background: transparent; color: var(--color-text); border: 1.5px solid var(--color-border);
  font-size: 13px; font-weight: 600; flex: 1 1 auto; min-width: 0; white-space: nowrap;
}
.ld-more-btn {
  width: 42px; height: 42px; border-radius: 50%; background: transparent; color: var(--color-text);
  border: 1.5px solid var(--color-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ld-more-btn svg { width: 16px; height: 16px; fill: currentColor; }

.ld-info-strip { display: flex; flex-direction: column; border-top: 1px solid var(--color-border); border-bottom: 1px solid var(--color-border); margin-bottom: 26px; padding: 4px 0; }
.ld-info-item { display: flex; align-items: center; gap: 9px; padding: 12px 0; }
.ld-info-item + .ld-info-item { border-top: 1px solid var(--color-border); }
.ld-info-icon { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: var(--color-bg-alt); color: var(--color-primary); display: flex; align-items: center; justify-content: center; }
.ld-info-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.ld-info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-muted); margin-bottom: 2px; }
.ld-info-val { font-size: 14px; font-weight: 700; }

.ld-sec-h { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--color-text); margin: 0 0 10px; }
.ld-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px; }
.ld-tag { padding: 7px 15px; border-radius: var(--radius-full); background: var(--color-bg-card); border: 1px solid var(--color-border); font-size: 12px; font-weight: 500; }

.ld-braid { width: 100%; height: 1px; background: var(--color-border); margin-bottom: 18px; }
.ld-more-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.ld-more-grid a { display: block; border-radius: 8px; overflow: hidden; aspect-ratio: 3/4; background: var(--color-border); }
.ld-more-grid img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ld-more-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.ld-more-head a { display: inline-flex; align-items: center; gap: 2px; font-size: 13px; font-weight: 600; color: var(--color-primary); }
.ld-more-head a svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

.ld-caption { font-size: 14px; color: var(--color-text-muted); line-height: 1.65; margin: 0 0 24px; }

.ld-reviews { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
.review { padding: 13px; margin-bottom: 9px; }
.review .r-head { display: flex; align-items: center; gap: 9px; }
.review .r-head img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
.review .r-name { font-weight: 600; font-size: 13px; }
.review .stars { margin-left: auto; display: flex; gap: 1px; }
.review .stars svg { width: 12px; height: 12px; }
.review p { font-size: 13px; line-height: 1.5; margin-top: 8px; color: #3d3a36; }
.verified-line { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-success); }

.ld-menu-overlay { position: fixed; inset: 0; z-index: 900; }
.ld-menu {
  position: absolute; z-index: 901; background: var(--color-bg-card); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); box-shadow: var(--shadow-md); min-width: 210px; overflow: hidden;
}
.ld-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 16px; font-size: 14px; font-weight: 500; color: var(--color-text); text-align: left; }
.ld-menu button:active { background: var(--color-bg-alt); }
.ld-menu-icon { width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid var(--color-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--color-text-muted); }
.ld-menu-icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="phone-wrap"><div class="scroll-root" id="scroll-root">

  <div class="ld-hero" id="hero-wrap">
    <img id="hero-img" src="" alt="">
    <button class="ld-back" id="back" type="button">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to results
    </button>
    <button class="ld-save" id="save" type="button" aria-label="Save look">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>

  <div class="ld-thumbs" id="thumbs"></div>

  <div class="ld-content">
    <div class="ld-kicker" id="kicker"></div>
    <h1 class="ld-h1" id="headline"></h1>

    <a class="ld-stylist-row" id="stylist-link">
      <img id="by-av" src="" alt="">
      <span>
        <span class="ld-stylist-name"><span id="by-n"></span><span class="ld-verified"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span></span>
        <span class="ld-stylist-meta">
          <svg viewBox="0 0 24 24" fill="var(--color-accent)" stroke="none"><path d="M12 2l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6-5.9-3.2-5.9 3.2 1.2-6.6L2.4 9l6.7-.9z"/></svg>
          <b id="by-rate"></b><span id="by-rev"></span><span id="by-city"></span>
        </span>
      </span>
    </a>

    <div class="ld-actions">
      <button class="ld-book" id="book" type="button">
        <svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>
        Book Now
      </button>
      <a class="ld-viewprofile" id="view-profile">View Profile</a>
      <div style="position:relative; flex-shrink:0;">
        <button class="ld-more-btn" id="more-btn" type="button" aria-label="More actions">
          <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
    </div>

    <div class="ld-info-strip" id="info-strip"></div>

    <p class="ld-sec-h">Explore this style</p>
    <div class="ld-tags" id="tags"></div>

    <div id="more-from-block"></div>

    <div id="caption-block"></div>
  </div>

  <div class="ld-content ld-reviews">
    <p class="ld-sec-h">What clients say</p>
    <div id="revs"></div>
  </div>

</div></div>

<script src="shared/seed.js?d=20260711"></script>
<script src="shared/snooty.js?d=20260711"></script>
<script src="shared/sync.js?d=20260711"></script>
<script>
(function () {
  'use strict';
  const SEED = window.SNOOTY_SEED;
  const params = new URLSearchParams(location.search);
  const inDemo = params.has('demo');
  const suffix = (inDemo ? '?demo=1' : '') + (params.has('session') ? (inDemo ? '&' : '?') + 'session=1' : '');
  const H = SEED.hero;

  SN.frameOnDesktop();
  SN.markSeen('look');
  if (params.has('session')) SN.sync.followStops(); /* hands off to the next stop when the presenter advances again */

  const i = parseInt(params.get('i'), 10);
  const feedLook = SEED.feed[!isNaN(i) ? i : 0] || SEED.feed[0];
  const heroLook = H.looks.find((l) => l.id === feedLook.heroLook) || H.looks[0];
  const service = H.services.find((s) => s.id === heroLook.serviceId);

  if (!inDemo) {
    SN.purposeCard({
      title: 'The work sold you. This closes it.',
      body: 'Real angles, a real price, reviews tied to real appointments. Everything a stranger needs before they book a stranger.',
      cta: 'Keep looking',
    });
  }

  document.getElementById('back').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else location.href = 'discover.html' + (inDemo ? '?demo=1' : '');
  });

  /* Category kicker + editorial headline, matching LookDetail.tsx's
     primaryCategory name + imageAltText fallback pattern */
  const categoryName = SEED.categories.find((c) => c.slug === feedLook.slug)?.name || 'Protective Style';
  document.getElementById('kicker').textContent = categoryName;
  document.getElementById('headline').textContent = feedLook.caption;

  document.getElementById('by-av').src = H.avatar;
  document.getElementById('by-n').textContent = feedLook.stylist;
  document.getElementById('by-rate').textContent = H.rating.toFixed(1);
  document.getElementById('by-rev').textContent = ' (' + H.reviewCount + ')';
  document.getElementById('by-city').textContent = ' · ' + H.city;
  document.getElementById('stylist-link').href = 'profile.html' + suffix;
  document.getElementById('view-profile').href = 'profile.html' + suffix;

  /* Thumbnail strip: this look's own angle photos only, real LookDetail
     shows no strip at all when there's just one photo. */
  const angles = heroLook.angles && heroLook.angles.length ? heroLook.angles : [feedLook.img];
  const heroImg = document.getElementById('hero-img');
  const thumbsWrap = document.getElementById('thumbs');
  let ai = 0;
  function paintAngle() {
    heroImg.src = angles[ai];
    thumbsWrap.querySelectorAll('button').forEach((b, j) => b.classList.toggle('on', j === ai));
  }
  if (angles.length > 1) {
    angles.forEach((src, j) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.setAttribute('aria-label', j === 0 ? 'Main photo' : 'Angle ' + j);
      b.innerHTML = '<img src="' + src + '" alt="">';
      b.addEventListener('click', () => { ai = j; paintAngle(); });
      thumbsWrap.appendChild(b);
    });
  } else {
    thumbsWrap.style.display = 'none';
  }
  paintAngle();

  /* Save (bookmark, not heart, to match the real product's icon) */
  const saveBtn = document.getElementById('save');
  saveBtn.addEventListener('click', () => saveBtn.classList.toggle('saved'));

  /* Info strip: dollar / clock / calendar / deposit-box icons, exact
     paths from LookDetail.tsx's infoItems, populated from real seed data */
  const dollarIcon = '<svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5.5H9.5a3 3 0 0 0 0 6h5a3 3 0 0 1 0 6H6"/></svg>';
  const clockIcon = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>';
  const calIcon = '<svg viewBox="0 0 24 24"><rect x="3" y="4.5" width="18" height="16" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>';
  const depositIcon = '<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';

  const depositCents = service ? Math.round(service.cents * SEED.platform.depositPct / 100) : 0;
  const infoItems = [
    { label: 'Price Range', value: SN.money(feedLook.cents), icon: dollarIcon },
    { label: 'Demand', value: 'Booked out 3 weeks', icon: calIcon },
    { label: 'Session', value: service ? SN.mins(service.mins) : '', icon: clockIcon },
    { label: 'Deposit', value: 'From ' + SN.money(depositCents), icon: depositIcon },
  ];
  const infoStrip = document.getElementById('info-strip');
  infoItems.forEach((it) => {
    const d = document.createElement('div');
    d.className = 'ld-info-item';
    d.innerHTML = '<span class="ld-info-icon">' + it.icon + '</span><div><div class="ld-info-label">' + it.label + '</div><div class="ld-info-val">' + it.value + '</div></div>';
    infoStrip.appendChild(d);
  });

  /* Style tag chips: every category this look is filed under */
  const tagsWrap = document.getElementById('tags');
  const tag = document.createElement('a');
  tag.className = 'ld-tag';
  tag.href = 'discover.html' + suffix;
  tag.textContent = 'See more ' + categoryName;
  tagsWrap.appendChild(tag);

  /* More from this stylist: her other looks in the same category */
  const moreFrom = H.looks.filter((l) => l.id !== heroLook.id && l.slug === heroLook.slug).slice(0, 3);
  if (moreFrom.length) {
    const block = document.getElementById('more-from-block');
    block.innerHTML = '<div class="ld-braid"></div>' +
      '<div class="ld-more-head"><p class="ld-sec-h" style="margin:0;">More from ' + feedLook.stylist + '</p>' +
      '<a href="profile.html' + suffix + '">Full portfolio <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a></div>' +
      '<div class="ld-more-grid" id="more-grid"></div>';
    const grid = document.getElementById('more-grid');
    moreFrom.forEach((l) => {
      const idx = SEED.feed.findIndex((f) => f.heroLook === l.id);
      const a = document.createElement('a');
      a.href = 'look.html?i=' + (idx >= 0 ? idx : 0) + suffix;
      a.innerHTML = '<img src="' + l.img + '" alt="">';
      grid.appendChild(a);
    });
  }

  /* From the stylist: caption, when distinct from the headline */
  document.getElementById('caption-block').innerHTML =
    '<div class="ld-braid"></div><p class="ld-sec-h">From the stylist</p>' +
    '<p class="ld-caption">Every install starts with a real consult, not a guess. This one took ' + (service ? SN.mins(service.mins) : 'a full session') + ', done right the first time.</p>';

  /* Reviews: real StarIcon path, VerifiedBadge-style check line */
  const starSvg = '<svg viewBox="0 0 24 24" fill="var(--color-accent)" stroke="none"><path d="M12 2l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6-5.9-3.2-5.9 3.2 1.2-6.6L2.4 9l6.7-.9z"/></svg>';
  const starSvgOff = '<svg viewBox="0 0 24 24" fill="var(--color-border)" stroke="none"><path d="M12 2l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6-5.9-3.2-5.9 3.2 1.2-6.6L2.4 9l6.7-.9z"/></svg>';
  const revs = document.getElementById('revs');
  const matching = SEED.reviews.filter((r) => !service || r.service === service.name);
  (matching.length ? matching : SEED.reviews).forEach((r) => {
    const d = document.createElement('div');
    d.className = 'card review';
    d.innerHTML =
      '<div class="r-head"><img src="' + r.avatar + '" alt=""><div><div class="r-name"></div></div>' +
      '<div class="stars">' + starSvg.repeat(r.stars) + starSvgOff.repeat(5 - r.stars) + '</div></div>' +
      '<p></p><span class="verified-line">✓ Verified completed appointment</span>';
    d.querySelector('.r-name').textContent = r.client;
    d.querySelector('p').textContent = r.text;
    revs.appendChild(d);
  });

  const bookBtn = document.getElementById('book');
  bookBtn.addEventListener('click', () => { location.href = 'booking.html?i=' + i + suffix; });

  /* "..." menu: Save / Share / Message / Report, matching LookDetail.tsx's dots menu */
  const moreBtn = document.getElementById('more-btn');
  moreBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const existing = document.querySelector('.ld-menu-overlay');
    if (existing) { existing.remove(); return; }
    const overlay = document.createElement('div');
    overlay.className = 'ld-menu-overlay';
    const rect = moreBtn.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'ld-menu';
    menu.style.top = (rect.bottom + 6) + 'px';
    menu.style.left = Math.max(8, rect.left - 150) + 'px';
    const items = [
      { label: 'Save Style', icon: '<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>' },
      { label: 'Share', icon: '<svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' },
      { label: 'Message Stylist', icon: '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' },
    ];
    items.forEach((it) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.innerHTML = '<span class="ld-menu-icon">' + it.icon + '</span>' + it.label;
      b.addEventListener('click', () => {
        overlay.remove();
        if (it.label === 'Save Style') saveBtn.classList.toggle('saved');
        else if (it.label === 'Message Stylist') location.href = 'messages.html' + suffix;
        else SN.toast('Link copied', 'This look\'s link is ready to share.', { icon: '↗' });
      });
      menu.appendChild(b);
    });
    overlay.appendChild(menu);
    overlay.addEventListener('click', () => overlay.remove());
    document.body.appendChild(overlay);
  });

})();
</script>
</body>
</html>
