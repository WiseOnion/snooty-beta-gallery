<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Snooty · A Day in the Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/snooty.css">
<style>
body { background: var(--color-bg-dark); color: var(--color-text-inverse); }
.stage-wrap { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

.dl-head { padding: calc(14px + env(safe-area-inset-top)) 20px 6px; text-align: center; }
.dl-head .k { font-family: var(--font-display); font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-accent); }
.dl-clock { font-family: var(--font-display); font-weight: 700; font-size: 42px; line-height: 1.1; margin-top: 2px; font-variant-numeric: tabular-nums; }
.dl-sub { font-size: 12.5px; color: var(--color-text-muted-inverse); min-height: 18px; }

.stage { flex: 1; position: relative; overflow: hidden; padding: 10px 18px; display: flex; align-items: center; justify-content: center; }
.scene { position: absolute; inset: 10px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  opacity: 0; transform: translateY(24px) scale(0.98); transition: all 550ms var(--ease-brand); pointer-events: none; }
.scene.on { opacity: 1; transform: none; pointer-events: auto; }

/* Shared surface card */
.surface {
  width: 100%; max-width: 360px; background: #fff; color: var(--color-text);
  border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); overflow: hidden;
}
.surface .sf-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--color-border); font-family: var(--font-display); font-weight: 600; font-size: 13px; }
.surface .sf-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-success); }

/* Scene 1: lock screen */
.lock { width: 100%; max-width: 340px; text-align: center; }
.lock .l-time { font-family: var(--font-display); font-weight: 300; font-size: 64px; color: #fff; }
.lock .l-date { font-size: 13px; color: var(--color-text-muted-inverse); margin-bottom: 22px; }
.notif {
  background: rgba(255,255,255,0.98); color: var(--color-text); border-radius: 18px; padding: 13px 15px;
  display: flex; gap: 12px; text-align: left; box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  opacity: 0; transform: translateY(-30px) scale(0.94);
}
.notif.land { animation: notif-land 700ms var(--ease-brand) forwards; }
@keyframes notif-land { to { opacity: 1; transform: none; } }
.notif .n-icon { width: 40px; height: 40px; border-radius: 11px; background: var(--color-primary); color: var(--color-accent); font-family: var(--font-display); font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 18px; flex: 0 0 40px; }
.notif .n-t { font-weight: 600; font-size: 13.5px; }
.notif .n-b { font-size: 12.5px; color: #555; margin-top: 2px; line-height: 1.4; }
.notif .n-when { margin-left: auto; font-size: 11px; color: #999; }

/* Scene captions */
.scene-cap { max-width: 340px; text-align: center; font-size: 14px; line-height: 1.55; color: var(--color-text-muted-inverse); }
.scene-cap b { color: var(--color-accent); font-family: var(--font-display); font-weight: 600; }

/* Scene 2: messages */
.msg-row { display: flex; gap: 10px; padding: 12px 16px; align-items: center; }
.msg-row img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
.msg-row .m-n { font-weight: 600; font-size: 13.5px; display: flex; align-items: center; gap: 7px; }
.msg-row .m-n .unread { width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); }
.msg-row .m-p { font-size: 12.5px; color: var(--color-text-muted); margin-top: 2px; }
.pinned { margin: 0 16px 12px; border: 1px solid var(--color-border); background: var(--color-bg-alt); border-radius: 12px; padding: 9px 12px; font-size: 11.5px; display: flex; gap: 8px; align-items: center; }
.pinned b { font-family: var(--font-display); color: var(--color-primary); }

/* Scene 3: save ping */
.save-look { position: relative; width: 100%; max-width: 300px; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
.save-look .ph { aspect-ratio: 4/5; }
.save-ping {
  position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.97); color: var(--color-text);
  border-radius: var(--radius-full); padding: 8px 14px; font-size: 12.5px; font-weight: 600;
  display: flex; align-items: center; gap: 7px; opacity: 0; transform: scale(0.7);
}
.save-ping.land { animation: ping-land 550ms var(--ease-brand) 400ms forwards; }
@keyframes ping-land { to { opacity: 1; transform: scale(1); } }
.save-ping .hh { color: var(--color-primary); }

/* Scene 4: review */
.review-card { padding: 16px; }
.review-card .stars { color: var(--color-accent); font-size: 17px; letter-spacing: 3px; }
.review-card .stars i { opacity: 0; display: inline-block; transform: scale(0.3); }
.scene.on .review-card .stars i { animation: star-in 380ms var(--ease-brand) forwards; }
.scene.on .review-card .stars i:nth-child(1) { animation-delay: 250ms; } .scene.on .review-card .stars i:nth-child(2) { animation-delay: 400ms; }
.scene.on .review-card .stars i:nth-child(3) { animation-delay: 550ms; } .scene.on .review-card .stars i:nth-child(4) { animation-delay: 700ms; }
.scene.on .review-card .stars i:nth-child(5) { animation-delay: 850ms; }
@keyframes star-in { to { opacity: 1; transform: scale(1); } }
.review-card p { font-size: 13.5px; line-height: 1.55; margin-top: 10px; color: #3d3a36; }
.review-card .who { display: flex; align-items: center; gap: 9px; margin-top: 12px; font-size: 12.5px; color: var(--color-text-muted); }
.review-card .who img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

/* Scene 5: checkout */
.pay-done { padding: 26px 16px; text-align: center; }
.pay-done .amt { font-family: var(--font-display); font-weight: 700; font-size: 40px; color: var(--color-success); }
.pay-done .lbl { font-size: 12.5px; color: var(--color-text-muted); margin-top: 4px; }
.pay-done .strip { display: flex; justify-content: space-between; border-top: 1px dashed var(--color-border); margin-top: 18px; padding-top: 12px; font-size: 12.5px; color: var(--color-text-muted); }

/* Scene 6: dashboard */
.dash { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dash .d-cell { background: var(--color-bg-alt); border: 1px solid var(--color-border); border-radius: 14px; padding: 14px 12px; }
.dash .d-num { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--color-primary); font-variant-numeric: tabular-nums; }
.dash .d-lbl { font-size: 11px; color: var(--color-text-muted); margin-top: 3px; line-height: 1.35; }
.dash .d-cell.zero .d-num { color: var(--color-success); }

/* Finale */
.finale { text-align: center; max-width: 340px; }
.finale .f-line { font-family: var(--font-editorial); font-style: italic; font-size: 27px; line-height: 1.35; }
.finale .f-vs { margin: 18px 0; display: flex; justify-content: center; gap: 26px; }
.finale .f-vs > div { text-align: center; }
.finale .f-vs .n { font-family: var(--font-display); font-weight: 700; font-size: 40px; }
.finale .f-vs .mon .n { color: var(--color-error); }
.finale .f-vs .tue .n { color: var(--color-success); }
.finale .f-vs .l { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-muted-inverse); font-family: var(--font-display); font-weight: 600; }

/* Timeline scrubber */
.timeline { padding: 10px 18px calc(16px + env(safe-area-inset-bottom)); }
.tl-track { display: flex; align-items: center; gap: 0; position: relative; height: 44px; }
.tl-line { position: absolute; left: 10px; right: 10px; height: 3px; background: #33302c; border-radius: 2px; }
.tl-fill { position: absolute; left: 10px; height: 3px; background: var(--color-accent); border-radius: 2px; width: 0; transition: width 500ms var(--ease-out); }
.tl-stop { position: relative; flex: 1; height: 44px; background: none; }
.tl-stop i { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 11px; height: 11px; border-radius: 50%; background: #3d3934; border: 2px solid var(--color-bg-dark); transition: all 250ms var(--ease-brand); }
.tl-stop.done i, .tl-stop.now i { background: var(--color-accent); }
.tl-stop.now i { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 0 5px rgba(201,154,74,0.2); }
.tl-stop .tt { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); font-family: var(--font-display); font-size: 9px; font-weight: 600; letter-spacing: 0.04em; color: var(--color-text-muted-inverse); white-space: nowrap; }
.tl-controls { display: flex; justify-content: center; gap: 12px; margin-top: 4px; }
.tl-btn { min-height: 40px; padding: 0 18px; border-radius: var(--radius-full); border: 1px solid var(--color-border-dark); color: var(--color-text-inverse); font-family: var(--font-display); font-weight: 600; font-size: 13px; transition: all 160ms var(--ease-out); }
.tl-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
.tl-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div class="stage-wrap">

  <div class="dl-head">
    <div class="k">A day in the life of a Snooty stylist</div>
    <div class="dl-clock" id="clock">8:00 AM</div>
    <div class="dl-sub" id="clock-sub">Tuesday. You're still asleep.</div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="timeline">
    <div class="tl-track" id="track"><div class="tl-line"></div><div class="tl-fill" id="fill"></div></div>
    <div class="tl-controls">
      <button class="tl-btn" id="play" type="button">Pause</button>
      <button class="tl-btn" id="nextb" type="button">Next moment</button>
    </div>
  </div>

</div>

<script src="shared/seed.js"></script>
<script src="shared/snooty.js"></script>
<script>
(function () {
  'use strict';
  const SEED = window.SNOOTY_SEED;
  const inDemo = new URLSearchParams(location.search).has('demo');
  SN.markSeen('day');

  const H = SEED.hero;
  const IMG = SEED.img;
  const AV = SEED.av;

  const SCENES = [
    {
      t: '8:00 AM', sub: "Tuesday. You're still asleep.", hold: 6500,
      html:
        '<div class="lock">' +
        '<div class="l-time">8:00</div><div class="l-date">Tuesday, September 8</div>' +
        '<div class="notif" id="notif1">' +
        '<div class="n-icon">s</div>' +
        '<div><div class="n-t">New booking · deposit paid</div>' +
        '<div class="n-b">Maya R. booked Knotless Braids - Medium, Sat 11:00 AM. $44.00 deposit secured.</div></div>' +
        '<div class="n-when">now</div></div></div>' +
        '<div class="scene-cap"><b>You did nothing.</b> She found your look, picked a real opening, and paid to hold it.</div>',
      enter: (el) => setTimeout(() => { el.querySelector('#notif1').classList.add('land'); SN.chime(); }, 700),
    },
    {
      t: '9:15 AM', sub: 'Coffee. One app instead of 40 DMs.', hold: 6000,
      html:
        '<div class="surface">' +
        '<div class="sf-bar"><span class="dot"></span> Messages</div>' +
        '<div class="msg-row"><img src="' + AV.maya + '" alt="">' +
        '<div><div class="m-n">Maya Reyes <span class="unread"></span></div>' +
        '<div class="m-p">Should I come with my hair blown out?</div></div></div>' +
        '<div class="pinned">📌 <span>Pinned to booking: <b>Knotless Medium · Sat 11:00 AM</b></span></div>' +
        '</div>' +
        '<div class="scene-cap">One unread. From a <b>booked, deposited client</b>. The thread already knows which appointment it\'s about.</div>',
    },
    {
      t: '11:00 AM', sub: 'Mid-install. Your portfolio works without you.', hold: 6000,
      html:
        '<div class="save-look"><div class="ph"><img data-src="' + IMG.knotlessBoho + '" alt="Boho knotless look"></div>' +
        '<div class="save-ping" id="ping"><span class="hh">❤</span> Saved by someone new</div></div>' +
        '<div class="scene-cap">A stranger in Charlotte just saved your boho knotless. <b>That\'s a future booking</b>, earned while your hands were busy.</div>',
      enter: (el) => setTimeout(() => { el.querySelector('#ping').classList.add('land'); SN.chime(); }, 500),
    },
    {
      t: '2:00 PM', sub: 'A review lands. Attached to real work.', hold: 7000,
      html:
        '<div class="surface"><div class="review-card">' +
        '<div class="stars"><i>★</i><i>★</i><i>★</i><i>★</i><i>★</i></div>' +
        '<p>"She actually listens. Zero tension on my edges and the parts are immaculate. Already rebooked."</p>' +
        '<div class="who"><img src="' + AV.maya + '" alt=""><span>Maya R. · Verified completed appointment</span></div>' +
        '</div></div>' +
        '<div class="scene-cap">It attached itself to the exact look it came from. <b>Not an anonymous star.</b> Proof.</div>',
    },
    {
      t: '6:30 PM', sub: 'Last client checks out.', hold: 6000,
      html:
        '<div class="surface"><div class="pay-done">' +
        '<div class="amt" id="amt">$0</div><div class="lbl">balance collected · Boho Knotless w/ Curls</div>' +
        '<div class="strip"><span>Deposit was settled at booking</span><span>No money talk today</span></div>' +
        '</div></div>' +
        '<div class="scene-cap">The awkward part of the day never happened. <b>It was settled three weeks ago</b>, at 8 AM, while you slept.</div>',
      enter: (el) => setTimeout(() => SN.countUp(el.querySelector('#amt'), 27200, { ms: 900, money: true }), 500),
    },
    {
      t: '9:00 PM', sub: 'The day, in numbers.', hold: 7500,
      html:
        '<div class="surface"><div class="sf-bar"><span class="dot"></span> Today · Roots & Ritual</div><div class="dash">' +
        '<div class="d-cell"><div class="d-num" data-n="61200" data-money>$0</div><div class="d-lbl">earned today</div></div>' +
        '<div class="d-cell"><div class="d-num" data-n="9">0</div><div class="d-lbl">bookings this week</div></div>' +
        '<div class="d-cell"><div class="d-num" data-n="3">0</div><div class="d-lbl">new clients found you</div></div>' +
        '<div class="d-cell zero"><div class="d-num">0</div><div class="d-lbl">DMs you had to answer</div></div>' +
        '</div></div>' +
        '<div class="scene-cap">Count the admin you did today. <b>Zero.</b> The platform did it.</div>',
      enter: (el) => el.querySelectorAll('[data-n]').forEach((n, i) =>
        setTimeout(() => SN.countUp(n, parseInt(n.dataset.n, 10), { ms: 900, money: n.hasAttribute('data-money') }), 400 + i * 200)),
    },
    {
      t: '11:59 PM', sub: '', hold: 99999,
      html:
        '<div class="finale">' +
        '<div class="f-line">Monday had 47 DMs.<br>Tuesday had zero,<br>and more money.</div>' +
        '<div class="f-vs">' +
        '<div class="mon"><div class="n">47</div><div class="l">Monday · DMs</div></div>' +
        '<div class="tue"><div class="n">0</div><div class="l">Tuesday · DMs</div></div>' +
        '</div>' +
        '<div class="scene-cap" style="margin-bottom:16px;">This could be your Tuesday.</div>' +
        '<button class="btn btn-gold" id="replay" type="button">Replay the day</button>' +
        (inDemo ? '' : ' <a class="btn btn-ghost" style="border-color:var(--color-border-dark); color:var(--color-text-inverse); margin-top:10px;" href="index.html">Back to the gallery</a>') +
        '</div>',
      enter: (el) => el.querySelector('#replay').addEventListener('click', () => go(0, true)),
    },
  ];

  const stage = document.getElementById('stage');
  const clock = document.getElementById('clock');
  const clockSub = document.getElementById('clock-sub');
  const track = document.getElementById('track');
  const fill = document.getElementById('fill');
  const playBtn = document.getElementById('play');
  const nextBtn = document.getElementById('nextb');

  /* Build scenes + timeline stops */
  const els = SCENES.map((s, i) => {
    const d = document.createElement('div');
    d.className = 'scene';
    d.innerHTML = s.html;
    stage.appendChild(d);
    const stop = document.createElement('button');
    stop.type = 'button';
    stop.className = 'tl-stop';
    stop.setAttribute('aria-label', 'Jump to ' + s.t);
    stop.innerHTML = '<span class="tt">' + s.t.replace(':00', '').replace(':15', ':15').replace(':30', ':30').replace(':59', '') + '</span><i></i>';
    stop.addEventListener('click', () => go(i, true));
    track.appendChild(stop);
    return d;
  });
  const stops = Array.from(track.querySelectorAll('.tl-stop'));

  let cur = -1, timer = null, playing = true;

  function go(i, user) {
    if (i >= SCENES.length) return;
    clearTimeout(timer);
    if (cur >= 0) els[cur].classList.remove('on');
    cur = i;
    const s = SCENES[i];
    els[i].classList.add('on');
    SN.hydrateImages(els[i]);
    clock.textContent = s.t;
    clockSub.textContent = s.sub;
    stops.forEach((st, j) => { st.className = 'tl-stop' + (j < i ? ' done' : j === i ? ' now' : ''); });
    fill.style.width = (i / (SCENES.length - 1) * 100) + '%';
    if (s.enter) s.enter(els[i]);
    if (playing && i < SCENES.length - 1) timer = setTimeout(() => go(i + 1), s.hold);
    if (user && !playing) { /* stay paused */ }
  }

  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
    if (playing && cur < SCENES.length - 1) timer = setTimeout(() => go(cur + 1), 1200);
    else clearTimeout(timer);
  });
  nextBtn.addEventListener('click', () => go(Math.min(cur + 1, SCENES.length - 1), true));
  stage.addEventListener('click', () => go(Math.min(cur + 1, SCENES.length - 1), true));

  go(0);
})();
</script>
</body>
</html>
