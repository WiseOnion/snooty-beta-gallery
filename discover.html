<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snooty · Discover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/snooty.css?d=20260718">
<style>
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: rgba(252,250,249,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--color-border);
  padding: calc(16px + env(safe-area-inset-top)) 16px 14px;
}
.brand { font-family: var(--font-display); font-weight: 400; font-size: 17px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--color-primary); padding-left: 0.22em; }
.loc { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-muted); }
.loc svg { width: 12px; height: 12px; }
.search {
  display: flex; align-items: center; gap: 10px; margin-top: 14px;
  background: var(--color-bg-alt); border: 1px solid var(--color-border); border-radius: var(--radius-full);
  padding: 0 16px; height: 44px;
  transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
}
.search:focus-within { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-soft); }
.search svg { width: 17px; height: 17px; stroke: var(--color-text-muted); flex: 0 0 auto; }
.search input { flex: 1; border: 0; background: none; outline: none; font-size: 16px; min-width: 0; } /* 16px+ stops iOS auto-zooming on focus */
.search input::placeholder { color: var(--color-text-muted); }
.search .clear { color: var(--color-text-muted); font-size: 13px; padding: 8px; margin-right: -8px; }
.chips {
  margin: 18px -16px 0; padding: 2px 16px 8px 22px; gap: 8px;
  /* fades the right edge so a partly-visible chip reads as "more to
     scroll" instead of getting hard-clipped by the phone frame */
  mask-image: linear-gradient(90deg, #000 calc(100% - 28px), transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 28px), transparent 100%);
}

.feed-head { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 16px 4px; }
.feed-head h2 { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
.feed-head .n { font-size: 12px; color: var(--color-text-muted); }

.masonry { columns: 2; column-gap: 8px; padding: 8px 16px calc(24px + env(safe-area-inset-bottom)); }
@media (min-width: 700px) { body:not(.framed) .masonry { columns: 4; max-width: 1100px; margin: 0 auto; } }

/* ---------------- LookCard: matches the real hisisnooty LookCard.tsx +
   discovery.css exactly. Photo-only card, no white meta box beneath it:
   like badge top-left, save button top-right, resting style tag
   bottom-left, and a stylist/rating/Book overlay that darkens over the
   photo on press. Cards never navigate here (see JS): tap/hold reveals
   the overlay, same as the real app's hover state, but goes nowhere. */
.lk-card {
  break-inside: avoid; margin-bottom: 8px; position: relative; border-radius: 14px; overflow: hidden;
  background: var(--color-border); -webkit-tap-highlight-color: transparent; transform: translateZ(0);
}
/* long-press callout/select/drag are already suppressed globally on all
   <img> (shared/snooty.css); pointer-events:none here just lets a tap
   pass through to the card itself instead of the (non-clickable) image. */
.lk-card img { pointer-events: none; }
/* Real, natural aspect ratio per photo, like the real PortfolioImage's
   aspectRatio="natural" on Discover: no forced box, no object-fit crop,
   so every card is exactly as tall or short as its actual photo. */
.lk-card-img { display: block; width: 100%; height: auto; }
.lk-card-scrim {
  position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 1;
  background: linear-gradient(0deg, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.08) 25%, rgba(0,0,0,0) 55%);
  opacity: 1; transition: opacity 300ms ease;
}
.lk-card::after {
  content: ""; position: absolute; inset: 0; border-radius: 14px; pointer-events: none; z-index: 1;
  background: linear-gradient(0deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.55) 35%, rgba(0,0,0,0.18) 60%, rgba(0,0,0,0) 80%);
  opacity: 0; transition: opacity 300ms ease;
}
.lk-card.is-open::after { opacity: 1; }

.lk-card-save {
  position: absolute; top: 12px; right: 12px; z-index: 3; width: 34px; height: 34px; border-radius: 50%;
  background: var(--color-primary); border: none; display: flex; align-items: center; justify-content: center; color: #fff;
  opacity: 0; transform: scale(0.78) translateY(-4px);
  transition: opacity 220ms ease, transform 240ms cubic-bezier(0.34,1.4,0.64,1), background 150ms ease;
}
/* Enlarges the tap target to ~44px (the accessibility minimum) without
   growing the visible 34px circle: an invisible hit area extends past
   the button's own edges in every direction. */
.lk-card-save::before {
  content: ""; position: absolute; inset: -5px;
}
.lk-card.is-open .lk-card-save, .lk-card-save.is-saved { opacity: 1; transform: scale(1) translateY(0); }
.lk-card-save.is-saved { background: var(--color-primary-deep); animation: lk-save-pop 360ms cubic-bezier(0.34,1.56,0.64,1); }
.lk-card-save svg { width: 14px; height: 14px; }
@keyframes lk-save-pop { 0% { transform: scale(1); } 45% { transform: scale(1.28); } 100% { transform: scale(1); } }

.lk-card-tag {
  position: absolute; bottom: 12px; left: 12px; z-index: 3;
  font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.5); pointer-events: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 24px);
  opacity: 1; transition: opacity 220ms ease;
}
.lk-card.is-open .lk-card-tag { opacity: 0; }

/* Overlay: a single tight info block bottom-left (caption over stylist
   name+rating, stacked with no wasted gap) and Book pinned bottom-right
   on its own baseline, so nothing drifts apart the way a plain column
   flex with equal gaps used to. */
.lk-card-overlay {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; padding: 20px 12px 12px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 8px;
  opacity: 0; transform: translateY(8px); pointer-events: none;
  transition: opacity 260ms ease, transform 260ms cubic-bezier(0.34,1.1,0.64,1);
}
.lk-card.is-open .lk-card-overlay { opacity: 1; transform: translateY(0); pointer-events: auto; }
.lk-card-overlay-info { min-width: 0; flex: 1 1 auto; }
.lk-card-overlay-tag {
  font-family: var(--font-display); font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  color: rgba(255,255,255,0.65); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px;
}
.lk-card-stylist { font-family: var(--font-display); font-size: 12.5px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 4px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lk-card-verified { display: inline-flex; align-items: center; justify-content: center; width: 12px; height: 12px; border-radius: 50%; background: var(--color-primary); flex-shrink: 0; }
.lk-card-verified svg { width: 6px; height: 6px; }
.lk-card-meta { font-family: var(--font-display); font-size: 10.5px; color: rgba(255,255,255,0.85); display: flex; align-items: center; gap: 3px; margin-top: 3px; }
.lk-card-meta svg { width: 9px; height: 9px; flex-shrink: 0; }
.lk-card-book {
  flex-shrink: 0; height: 28px; padding: 0 13px; border-radius: 9999px; border: none; background: #fff;
  color: var(--color-secondary); font-family: var(--font-display); font-size: 10.5px; font-weight: 700;
}

.empty { text-align: center; padding: 60px 32px; }
.empty h3 { font-family: var(--font-display); font-weight: 600; font-size: 17px; margin-top: 14px; }
.empty p { font-size: 13.5px; color: var(--color-text-muted); margin-top: 6px; }
</style>
</head>
<body>
<div class="phone-wrap"><div class="scroll-root" id="scroll-root">

  <header class="hdr">
    <div class="row" style="justify-content: space-between;">
      <div class="brand">snooty</div>
      <div class="loc"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg> Fayetteville, NC</div>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder='Try "knotless" or "silk press"' autocomplete="off" aria-label="Search looks">
      <button class="clear hidden" id="clear" type="button" aria-label="Clear search">Clear</button>
    </div>
    <div class="chips snap-row" id="chips"></div>
  </header>

  <div class="feed-head"><h2 id="feed-title">Looks near you</h2><span class="n" id="feed-n"></span></div>
  <main class="masonry" id="feed" aria-live="polite"></main>

</div></div>

<script src="shared/seed.js?d=20260718"></script>
<script src="shared/snooty.js?d=20260718"></script>
<script src="shared/sync.js?d=20260718"></script>
<script>
(function () {
  'use strict';
  const SEED = window.SNOOTY_SEED;
  const params = new URLSearchParams(location.search);
  const inDemo = params.has('demo');
  const suffix = (inDemo ? '?demo=1' : '') + (params.has('session') ? (inDemo ? '&' : '?') + 'session=' + encodeURIComponent(params.get('session')) : '');

  SN.frameOnDesktop();
  SN.markSeen('discover');
  if (params.has('session')) { SN.sync.followStops(); SN.sync.startHeartbeat(); } /* hands off to the next stop when the presenter advances again, and keeps this phone counted as connected */

  if (!inDemo) {
    SN.purposeCard({
      title: 'This is what your future client sees.',
      body: 'A feed of finished work, not business listings. Scroll it, search it, press a look to see it come alive.',
      cta: 'Start scrolling',
    });
  }

  const starSvg = '<svg viewBox="0 0 24 24" fill="var(--color-accent)" stroke="none"><path d="M12 2l2.9 6.1 6.7.9-4.9 4.6 1.2 6.6-5.9-3.2-5.9 3.2 1.2-6.6L2.4 9l6.7-.9z"/></svg>';
  const saveSvg = (filled) => '<svg viewBox="0 0 24 24" fill="' + (filled ? '#fff' : 'none') + '" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
  const verifiedSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  function card(look, i) {
    const el = document.createElement('article');
    el.className = 'lk-card';
    el.dataset.feedI = String(i);
    el.innerHTML =
      '<img class="lk-card-img" data-src="' + look.img + '" alt="' + look.caption + '">' +
      '<div class="lk-card-scrim"></div>' +
      '<button class="lk-card-save" type="button" aria-label="Save look">' + saveSvg(false) + '</button>' +
      '<div class="lk-card-tag"></div>' +
      '<div class="lk-card-overlay">' +
      '<div class="lk-card-overlay-info">' +
      '<div class="lk-card-overlay-tag"></div>' +
      '<div class="lk-card-stylist"><span></span><span class="lk-card-verified">' + verifiedSvg + '</span></div>' +
      '<div class="lk-card-meta">' + starSvg + '<b style="font-family:\'Space Mono\',monospace;">4.9</b></div>' +
      '</div>' +
      '<button class="lk-card-book" type="button">Book</button>' +
      '</div>';

    el.querySelector('.lk-card-tag').textContent = look.caption;
    el.querySelector('.lk-card-overlay-tag').textContent = look.caption;
    el.querySelector('.lk-card-stylist span').textContent = look.stylist;

    /* Press/hold reveals the overlay, exactly like the real app's hover
       state, but this feed never navigates: it's a preview, not a link.
       A tap outside any open card closes it (handled once, below).
       Bound on both pointerdown (real touch/mouse press) and click
       (synthetic/automated taps, and a safety net if pointerdown is
       ever missed) with a timestamp guard so a single interaction that
       fires both never double-toggles the card back closed. */
    let lastToggle = 0;
    function toggleOpen() {
      const now = Date.now();
      if (now - lastToggle < 350) return;
      lastToggle = now;
      document.querySelectorAll('.lk-card.is-open').forEach((c) => { if (c !== el) c.classList.remove('is-open'); });
      el.classList.toggle('is-open');
    }
    el.addEventListener('pointerdown', toggleOpen);
    el.addEventListener('click', toggleOpen);

    const saveBtn = el.querySelector('.lk-card-save');
    saveBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const nowSaved = saveBtn.classList.toggle('is-saved');
      saveBtn.innerHTML = saveSvg(nowSaved);
      if (nowSaved) SN.toast('Saved to your collection', look.caption, { icon: '✓' });
    });
    el.querySelector('.lk-card-book').addEventListener('click', (e) => { e.stopPropagation(); });

    return el;
  }

  /* Tapping empty feed space (not a card) closes any open overlay */
  document.getElementById('feed').addEventListener('pointerdown', (e) => {
    if (!e.target.closest('.lk-card')) document.querySelectorAll('.lk-card.is-open').forEach((c) => c.classList.remove('is-open'));
  });

  function render(list, term) {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    document.getElementById('feed-title').textContent = term ? '"' + term + '"' : 'Looks near you';
    document.getElementById('feed-n').textContent = list.length ? list.length + ' looks' : '';
    if (!list.length) {
      feed.innerHTML = '<div class="empty"><h3>Nothing matched that, yet</h3><p>Try a different word, or browse everything below.</p></div>';
      return;
    }
    list.forEach((look) => feed.appendChild(card(look, SEED.feed.indexOf(look))));
    SN.hydrateImages(feed);
  }

  function search(term) {
    const t = term.trim().toLowerCase();
    if (!t) return render(SEED.feed, '');
    const hit = (look) =>
      look.caption.toLowerCase().includes(t) ||
      look.slug.toLowerCase().includes(t.replace(/\s+/g, '-')) ||
      look.stylist.toLowerCase().includes(t);
    render(SEED.feed.filter(hit), term);
  }

  const chips = document.getElementById('chips');
  SEED.categories.forEach((c) => {
    const b = document.createElement('button');
    b.className = 'chip' + (c.slug === 'all' ? ' is-active' : '');
    b.type = 'button';
    b.textContent = c.name;
    b.dataset.slug = c.slug;
    b.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach((x) => x.classList.remove('is-active'));
      b.classList.add('is-active');
      document.getElementById('q').value = '';
      if (c.slug === 'all') return render(SEED.feed, '');
      render(SEED.feed.filter((l) => l.slug === c.slug), c.name);
    });
    chips.appendChild(b);
  });

  const qInput = document.getElementById('q');
  const clearBtn = document.getElementById('clear');
  qInput.addEventListener('input', () => {
    clearBtn.classList.toggle('hidden', !qInput.value);
    document.querySelectorAll('.chip').forEach((x) => x.classList.toggle('is-active', x.dataset.slug === 'all'));
    search(qInput.value);
  });
  qInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') SN.dismissKeyboard(qInput); /* search already filters live */ });
  clearBtn.addEventListener('click', () => { qInput.value = ''; clearBtn.classList.add('hidden'); render(SEED.feed, ''); qInput.focus(); });

  render(SEED.feed, '');
})();
</script>
</body>
</html>
